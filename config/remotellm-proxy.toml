# PQCrypta Proxy — remotellm / tcp2.pqcrypta.com
# ================================================
# Speedtest-only deployment: no proxy backends, just the built-in
# WebTransport speedtest server on port 4433.
#
# Deploy:
#   1. Copy binary + this file to /etc/pqcrypta/proxy-config.toml on remotellm
#   2. Create /etc/systemd/system/pqcrypta-proxy.service (see scripts/ip-update.service)
#   3. Set Environment="SPEEDTEST_SERVER_NAME=US Midwest" in the service unit
#   4. Run scripts/ip-update.sh (or enable scripts/ip-update.timer) for dynamic-IP updates
#   5. Copy data/geoip/ databases, or run scripts/download_geoip.sh

# =============================
# Server Configuration
# =============================
[server]
bind_address = "0.0.0.0"
udp_port = 4433
additional_ports = []
webtransport_allowed_origins = [
    "https://pqcrypta.com",
    "https://www.pqcrypta.com"
]

# tcp2.pqcrypta.com = HTTP/1.1-only TCP speedtest endpoint
# api2.pqcrypta.com = QUIC/WebTransport speedtest endpoint (no restriction)
tcp_only_hosts  = ["tcp2.pqcrypta.com"]
http11_only_hosts = ["tcp2.pqcrypta.com"]
max_connections = 200
max_streams_per_connection = 200
keepalive_interval_secs = 15
max_idle_timeout_secs = 120
enable_ipv6 = false
worker_threads = 4
graceful_shutdown_timeout_secs = 30

# =============================
# TLS Configuration
# =============================
[tls]
# QUIC listener only serves api2.pqcrypta.com (tcp2 is http11_only, no QUIC).
# HTTP/1.1 listener uses SNI dir-scan and loads both certs automatically.
cert_path = "/etc/pqcrypta/certs/api2.pqcrypta.com.crt"
key_path  = "/etc/pqcrypta/certs/api2.pqcrypta.com.key"
require_client_cert = false
alpn_protocols = ["h3", "h2", "http/1.1", "webtransport"]
min_version = "1.3"
ocsp_stapling = true
cert_reload_interval_secs = 3600
enable_0rtt = false

# =============================
# HTTP→HTTPS Redirect (ACME HTTP-01 challenge)
# =============================
[http_redirect]
enabled = true
port = 80
redirect_to_https = true
allowed_domains = ["tcp2.pqcrypta.com", "api2.pqcrypta.com"]

# =============================
# ACME — auto-provision tcp2.pqcrypta.com
# =============================
[acme]
enabled = true
directory_url = "https://acme-v02.api.letsencrypt.org/directory"
email = "admin@pqcrypta.com"
domains = ["tcp2.pqcrypta.com", "api2.pqcrypta.com"]
certs_path = "/etc/pqcrypta/certs"
account_path = "/etc/pqcrypta/acme/account.json"
renewal_days = 30
check_interval_hours = 24
use_ecdsa = true
challenge_type = "http-01"
accept_tos = true

# =============================
# Cache — disabled (speedtest = no cacheable content)
# =============================
[cache]
enabled = false
max_size_mb = 32
default_ttl_secs = 0
max_body_size_bytes = 0
excluded_paths = ["/"]
no_cache_set_cookie = true

# =============================
# OpenTelemetry — disabled by default
# =============================
[otel]
enabled = false
service_name = "pqcrypta-proxy-tcp2"
otlp_endpoint = "http://localhost:4318"
sample_ratio = 0.0

# =============================
# Security Headers
# =============================
[headers]
hsts = "max-age=63072000; includeSubDomains; preload"
x_frame_options = "DENY"
x_content_type_options = "nosniff"
referrer_policy = "strict-origin-when-cross-origin"
permissions_policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
cross_origin_opener_policy = "unsafe-none"
cross_origin_embedder_policy = "unsafe-none"
cross_origin_resource_policy = "cross-origin"
x_permitted_cross_domain_policies = "none"
x_download_options = "noopen"
x_dns_prefetch_control = "off"
x_quantum_resistant = "ML-KEM-1024, ML-DSA-87, X25519MLKEM768"
x_security_level = "Post-Quantum Ready"
server_timing_enabled = false
accept_ch = ""
nel = ""
report_to = ""
priority = "u=3,i=?0"

# =============================
# Post-Quantum Cryptography
# =============================
[pqc]
enabled = true
provider = "auto"
openssl_path = "/usr/local/openssl-3.5/bin/openssl"
openssl_lib_path = "/usr/local/openssl-3.5/lib64"
preferred_kem = "X25519MLKEM768"
enable_hybrid = true

# =============================
# Rate Limiting (lighter than primary — LLM shares the machine)
# =============================
[rate_limiting]
enabled = true
requests_per_second = 50
burst_size = 200
per_ip_limit = 20
block_duration_secs = 60

# =============================
# Security — body size must accommodate speedtest 50MB upload payloads
# =============================
[security]
max_request_size = 104857600

# =============================
# WAF — basic protection
# =============================
[waf]
enabled = true
block_sql_injection = true
block_xss = true
block_path_traversal = true
block_known_scanners = true

# =============================
# Logging
# =============================
[logging]
level = "info"
format = "json"
file = "/var/log/pqcrypta/proxy-tcp2.log"
max_size_mb = 50
max_backups = 3
max_age_days = 7
